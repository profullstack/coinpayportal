name: Publish SDK to npm

on:
  push:
    branches: [master]
    paths:
      - 'packages/sdk/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Check if version already published
        id: check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          if npm view "@profullstack/coinpay@$CURRENT" version 2>/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "⏭️  v$CURRENT already on npm — skipping publish"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "📦 v$CURRENT not on npm — will publish"
          fi

      - name: Build (if build script exists)
        if: steps.check.outputs.published == 'false'
        run: npm run build --if-present

      - name: Verify npm auth
        if: steps.check.outputs.published == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is empty — set it in repo Settings → Secrets → Actions."
            exit 1
          fi
          if ! WHO=$(npm whoami 2>/dev/null); then
            echo "::error::npm auth failed — NPM_TOKEN is missing/expired/revoked. Generate a new @profullstack automation (or granular read+write) token and update the NPM_TOKEN secret. (A dead token surfaces downstream as a misleading 404 on publish.)"
            exit 1
          fi
          echo "✅ Authenticated to npm as: ${WHO}"

      - name: Publish to npm
        if: steps.check.outputs.published == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --ignore-scripts

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.published }}" == "true" ]; then
            echo "### ⏭️ Skipped — v${{ steps.check.outputs.version }} already published" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ✅ Published @profullstack/coinpay@${{ steps.check.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          fi
